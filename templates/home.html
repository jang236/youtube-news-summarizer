<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 요약봇</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --card: #1c2333;
            --card-h: #242d3d;
            --border: #30363d;
            --text: #e6edf3;
            --text2: #8b949e;
            --muted: #6e7681;
            --blue: #3b82f6;
            --blue-h: #2563eb;
            --blue-g: rgba(59, 130, 246, .15);
            --green: #2ea043;
            --red: #f85149;
            --orange: #d29922;
            --r: 12px;
            --rs: 8px;
            --t: .2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh
        }

        /* Header */
        .hd {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .hd-in {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
            text-decoration: none
        }

        .logo-i {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #f85149, #ff6b6b);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px
        }

        .hd-r {
            display: flex;
            align-items: center;
            gap: 8px
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            border-radius: var(--rs);
            cursor: pointer;
            transition: var(--t);
            text-decoration: none;
            font-family: inherit
        }

        .btn-p {
            background: var(--blue);
            color: #fff
        }

        .btn-p:hover {
            background: var(--blue-h)
        }

        .btn-p:disabled {
            opacity: .5;
            cursor: not-allowed
        }

        .btn-g {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border)
        }

        .btn-g:hover {
            background: var(--card);
            color: var(--text)
        }

        .btn-d {
            background: transparent;
            color: var(--red);
            border: 1px solid rgba(248, 81, 73, .3);
            padding: 4px 10px;
            font-size: 11px
        }

        .btn-d:hover {
            background: rgba(248, 81, 73, .1)
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px
        }

        /* Main */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px
        }

        /* Highlight Card */
        .highlight {
            background: linear-gradient(135deg, #1a1f35, #1c2333);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden
        }

        .highlight::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--blue), #8b5cf6, var(--blue))
        }

        .hl-label {
            font-size: 11px;
            color: var(--blue);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px
        }

        .hl-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.7
        }

        .hl-empty {
            font-size: 13px;
            color: var(--muted);
            font-style: italic
        }

        /* Section */
        .sec {
            margin-bottom: 24px
        }

        .sec-h {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px
        }

        .sec-t {
            font-size: 16px;
            font-weight: 600
        }

        .sec-sub {
            font-size: 12px;
            color: var(--muted);
            margin-left: 8px;
            font-weight: 400
        }

        /* Channel Group */
        .ch-group {
            margin-bottom: 20px
        }

        .ch-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--blue);
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .ch-count {
            font-size: 11px;
            color: var(--muted);
            font-weight: 400
        }

        /* Video Card */
        .v-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 14px;
            display: flex;
            gap: 14px;
            transition: var(--t);
            cursor: pointer;
            margin-bottom: 8px
        }

        .v-card:hover {
            background: var(--card-h);
            border-color: var(--blue);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, .3)
        }

        .v-thumb {
            width: 140px;
            min-width: 140px;
            height: 79px;
            border-radius: var(--rs);
            object-fit: cover;
            background: var(--bg)
        }

        .v-info {
            flex: 1;
            min-width: 0
        }

        .v-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .v-sum {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .v-meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px
        }

        /* Channel Manage */
        .ch-manage {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 16px
        }

        .ch-manage-h {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 10px;
            font-weight: 500
        }

        .ch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border)
        }

        .ch-row:last-child {
            border-bottom: none
        }

        .ch-name {
            font-size: 13px;
            font-weight: 500
        }

        .ch-id {
            font-size: 11px;
            color: var(--muted)
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-top: 10px
        }

        .inp {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--rs);
            color: var(--text);
            outline: none;
            transition: var(--t);
            font-family: inherit
        }

        .inp:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-g)
        }

        .inp::placeholder {
            color: var(--muted)
        }

        /* Analyze Modal */
        .modal-bg {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 17, 23, .88);
            z-index: 800;
            align-items: flex-start;
            justify-content: center;
            padding: 60px 20px 20px;
            overflow-y: auto
        }

        .modal-bg.show {
            display: flex
        }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            max-width: 800px;
            width: 100%;
            padding: 24px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, .5)
        }

        .modal-h {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px
        }

        .modal-h h2 {
            font-size: 18px;
            font-weight: 600
        }

        .modal-x {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px
        }

        .modal-x:hover {
            color: var(--text);
            background: var(--card)
        }

        /* Analysis Result */
        .result {
            margin-top: 16px
        }

        .result-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 20px;
            margin-top: 12px
        }

        .result-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px
        }

        .result-ch {
            font-size: 12px;
            color: var(--blue);
            margin-bottom: 12px
        }

        .result-body {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text2)
        }

        .result-body p {
            margin-bottom: 12px
        }

        .result-body strong {
            color: var(--text)
        }

        .result-body ul,
        .result-body ol {
            padding-left: 20px;
            margin-bottom: 12px
        }

        .result-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--blue);
            margin-top: 12px;
            text-decoration: none
        }

        .result-link:hover {
            text-decoration: underline
        }

        /* History */
        .hist-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--t)
        }

        .hist-item:hover {
            background: var(--card);
            margin: 0 -12px;
            padding: 10px 12px;
            border-radius: var(--rs)
        }

        .hist-thumb {
            width: 60px;
            height: 34px;
            border-radius: 4px;
            object-fit: cover
        }

        .hist-title {
            font-size: 12px;
            font-weight: 500;
            flex: 1
        }

        .hist-date {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap
        }

        /* Detail Modal */
        .detail-bg {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 17, 23, .88);
            z-index: 900;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
            overflow-y: auto
        }

        .detail-bg.show {
            display: flex
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 18px;
            border-radius: var(--rs);
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            transform: translateY(80px);
            opacity: 0;
            transition: .3s ease
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1
        }

        .toast-ok {
            background: var(--green);
            color: #fff
        }

        .toast-err {
            background: var(--red);
            color: #fff
        }

        /* Loading */
        .spin {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: sp .7s linear infinite;
            display: inline-block
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }

        .ld {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 17, 23, .8);
            z-index: 950;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px
        }

        .ld.show {
            display: flex
        }

        .ld-t {
            font-size: 13px;
            color: var(--text2)
        }

        /* Empty */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted)
        }

        .empty-i {
            font-size: 40px;
            margin-bottom: 12px
        }

        .empty-t {
            font-size: 14px;
            color: var(--text2)
        }

        /* Responsive */
        @media(max-width:600px) {
            .v-card {
                flex-direction: column
            }

            .v-thumb {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9
            }

            .main {
                padding: 12px
            }

            .input-row {
                flex-direction: column
            }
        }
    </style>
</head>

<body>

    <header class="hd">
        <div class="hd-in">
            <a href="/" class="logo">
                <div class="logo-i">▶</div>YouTube 요약봇
            </a>
            <div class="hd-r">
                <button class="btn btn-p btn-sm" onclick="openAnalyze()">🔍 영상 분석</button>
                <button class="btn btn-g btn-sm" id="btnDigest" onclick="runDigest()">▶ 수집 실행</button>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- 오늘의 핵심 -->
        <div class="highlight" id="highlightCard">
            <div class="hl-label">🔥 오늘의 핵심</div>
            <div class="hl-text" id="highlightText">
                <span class="hl-empty">아직 수집된 인사이트가 없습니다. '수집 실행'을 눌러주세요.</span>
            </div>
        </div>

        <!-- 채널별 피드 -->
        <div class="sec">
            <div class="sec-h">
                <h2 class="sec-t">📡 채널 인사이트</h2>
                <button class="btn btn-g btn-sm" onclick="loadFeed()">🔄</button>
            </div>
            <div id="feedArea">
                <div class="empty">
                    <div class="empty-i">📡</div>
                    <div class="empty-t">채널을 등록하고 수집을 실행하세요</div>
                </div>
            </div>
        </div>

        <!-- 채널 관리 (인라인) -->
        <div class="ch-manage">
            <div class="ch-manage-h">📋 등록 채널</div>
            <div id="chList"></div>
            <div class="input-row">
                <input class="inp" id="chInput" placeholder="YouTube 채널 URL (예: https://www.youtube.com/@blueoak1004)">
                <button class="btn btn-p" onclick="addCh()">+ 추가</button>
            </div>
        </div>
    </main>

    <!-- 영상 분석 모달 -->
    <div id="analyzeModal" class="modal-bg" onclick="if(event.target===this)closeAnalyze()">
        <div class="modal">
            <div class="modal-h">
                <h2>🔍 영상 분석</h2>
                <button class="modal-x" onclick="closeAnalyze()">✕</button>
            </div>
            <div class="input-row" style="margin-top:0">
                <input class="inp" id="videoUrl" placeholder="YouTube URL을 입력하세요"
                    style="font-size:15px;padding:12px 14px">
                <button class="btn btn-p" id="btnAnalyze" onclick="analyze()" style="padding:12px 20px">분석</button>
            </div>

            <!-- 분석 결과 -->
            <div id="analyzeResult" class="result" style="display:none">
                <div class="result-box">
                    <div class="result-ch" id="resCh"></div>
                    <div class="result-title" id="resTitle"></div>
                    <div class="result-body" id="resBody"></div>
                    <a class="result-link" id="resLink" href="#" target="_blank">🔗 원본 영상 보기</a>
                </div>
            </div>

            <!-- 최근 분석 히스토리 -->
            <div style="margin-top:20px">
                <div style="font-size:12px;color:var(--muted);margin-bottom:8px">최근 분석 히스토리</div>
                <div id="histList"></div>
            </div>
        </div>
    </div>

    <!-- 상세 모달 -->
    <div id="detailModal" class="detail-bg" onclick="if(event.target===this)closeDetail()">
        <div class="modal">
            <div class="modal-h">
                <div>
                    <div style="font-size:12px;color:var(--blue)" id="dCh"></div>
                    <h2 id="dTitle" style="font-size:16px"></h2>
                </div>
                <button class="modal-x" onclick="closeDetail()">✕</button>
            </div>
            <div class="result-body" id="dBody"></div>
            <a class="result-link" id="dLink" href="#" target="_blank">🔗 원본 영상 보기</a>
        </div>
    </div>

    <!-- Loading / Toast -->
    <div id="ld" class="ld">
        <div class="spin" style="width:36px;height:36px;border-width:3px"></div>
        <div class="ld-t" id="ldText">처리 중...</div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        const A = '';

        // Toast
        function toast(m, ok = true) { const t = document.getElementById('toast'); t.textContent = m; t.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err') + ' show'; setTimeout(() => t.classList.remove('show'), 3000) }

        // Loading
        function showLd(t) { document.getElementById('ldText').textContent = t || '처리 중...'; document.getElementById('ld').classList.add('show') }
        function hideLd() { document.getElementById('ld').classList.remove('show') }

        // API
        async function api(u, m = 'GET', b = null) { const o = { method: m, headers: { 'Content-Type': 'application/json' } }; if (b) o.body = JSON.stringify(b); const r = await fetch(A + u, o); return r.json() }

        // === Feed ===
        async function loadFeed() {
            try {
                const [archData, chData] = await Promise.all([api('/api/archive/list'), api('/api/channels')]);
                const analyses = archData.analyses || [];
                const channels = chData.channels || [];
                const area = document.getElementById('feedArea');

                if (!analyses.length) {
                    area.innerHTML = '<div class="empty"><div class="empty-i">📡</div><div class="empty-t">수집된 영상이 없습니다</div></div>';
                    buildHighlight([]);
                    return;
                }

                // 채널별 그룹핑
                const groups = {};
                analyses.forEach(a => {
                    const ch = a.channel_name || '기타';
                    if (!groups[ch]) groups[ch] = [];
                    groups[ch].push(a);
                });

                let html = '';
                for (const [ch, vids] of Object.entries(groups)) {
                    html += `<div class="ch-group">
                <div class="ch-label">${esc(ch)} <span class="ch-count">${vids.length}개</span></div>`;
                    vids.slice(0, 5).forEach(v => {
                        html += `<div class="v-card" onclick="showDetail(${v.id})">
                    <img class="v-thumb" src="${v.thumbnail_url || 'https://img.youtube.com/vi/' + v.video_id + '/hqdefault.jpg'}" alt="" loading="lazy">
                    <div class="v-info">
                        <div class="v-title">${esc(v.title)}</div>
                        <div class="v-sum">${esc((v.summary || '').substring(0, 120))}</div>
                        <div class="v-meta">${fmtDate(v.created_at)}</div>
                    </div>
                </div>`;
                    });
                    html += `</div>`;
                }
                area.innerHTML = html;
                buildHighlight(analyses);
            } catch (e) { console.error(e) }
        }

        function buildHighlight(analyses) {
            const el = document.getElementById('highlightText');
            if (!analyses.length) {
                el.innerHTML = '<span class="hl-empty">아직 수집된 인사이트가 없습니다. \'수집 실행\'을 눌러주세요.</span>';
                return;
            }
            // 최근 5개 요약에서 첫 문장 추출
            const summaries = analyses.slice(0, 5).map(a => {
                const s = (a.summary || '').split(/[.!?\n]/)[0];
                return s ? s.trim() : '';
            }).filter(Boolean);
            if (summaries.length) {
                el.innerHTML = summaries.map(s => '• ' + esc(s)).join('<br>');
            }
        }

        // === Channels ===
        async function loadCh() {
            try {
                const d = await api('/api/channels');
                const el = document.getElementById('chList');
                if (!d.channels || !d.channels.length) { el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0">등록된 채널이 없습니다</div>'; return }
                el.innerHTML = d.channels.map(c => `
            <div class="ch-row">
                <div><div class="ch-name">${esc(c.channel_name || c.channel_url)}</div><div class="ch-id">${esc(c.channel_id || '')}</div></div>
                <button class="btn btn-d" onclick="delCh(${c.id},'${esc(c.channel_name)}')">삭제</button>
            </div>`).join('');
            } catch (e) { console.error(e) }
        }

        async function addCh() {
            const url = document.getElementById('chInput').value.trim();
            if (!url) { toast('채널 URL을 입력해주세요', false); return }
            showLd('채널 등록 중...');
            try {
                const d = await api('/api/channels', 'POST', { channel_url: url });
                hideLd();
                if (d.success) { toast('✅ ' + d.channel.channel_name + ' 등록 완료'); document.getElementById('chInput').value = ''; loadCh() }
                else toast('❌ ' + (d.message || '등록 실패'), false);
            } catch (e) { hideLd(); toast('❌ 오류', false) }
        }

        async function delCh(id, name) {
            if (!confirm('"' + name + '" 삭제할까요?')) return;
            try { await api('/api/channels/' + id, 'DELETE'); toast('🗑️ 삭제됨'); loadCh() } catch (e) { toast('❌ 실패', false) }
        }

        // === Digest ===
        async function runDigest() {
            const btn = document.getElementById('btnDigest');
            btn.disabled = true; btn.textContent = '⏳ 수집 중...';
            showLd('채널 인사이트 수집 중... (2~3분 소요)');
            try {
                const d = await api('/api/daily_digest', 'POST', { hours: 48 });
                hideLd();
                if (d.success) { toast(`✅ ${d.total_videos}개 수집, ${d.total_summarized}개 요약`); loadFeed() }
                else toast('❌ ' + (d.message || '실패'), false);
            } catch (e) { hideLd(); toast('❌ 오류', false) }
            finally { btn.disabled = false; btn.textContent = '▶ 수집 실행' }
        }

        // === Analyze Modal ===
        function openAnalyze() { document.getElementById('analyzeModal').classList.add('show'); loadHist() }
        function closeAnalyze() { document.getElementById('analyzeModal').classList.remove('show') }

        async function analyze() {
            const url = document.getElementById('videoUrl').value.trim();
            if (!url) { toast('URL을 입력해주세요', false); return }
            const btn = document.getElementById('btnAnalyze');
            btn.disabled = true; showLd('영상 분석 중...');
            try {
                const d = await api('/api/analyze', 'POST', { video_url: url, analysis_type: 'single' });
                hideLd();
                if (d.success) {
                    document.getElementById('resCh').textContent = d.video_info?.channel_name || '';
                    document.getElementById('resTitle').textContent = d.video_info?.title || '';
                    document.getElementById('resBody').innerHTML = fmt(d.summary || '');
                    document.getElementById('resLink').href = url;
                    document.getElementById('analyzeResult').style.display = 'block';
                    document.getElementById('videoUrl').value = '';
                    toast('✅ 분석 완료!');
                    loadHist(); loadFeed();
                } else toast('❌ ' + (d.message || '실패'), false);
            } catch (e) { hideLd(); toast('❌ 오류', false) }
            finally { btn.disabled = false }
        }

        async function loadHist() {
            try {
                const d = await api('/api/archive/list');
                const el = document.getElementById('histList');
                const singles = (d.analyses || []).filter(a => a.analysis_type === 'single').slice(0, 8);
                if (!singles.length) { el.innerHTML = '<div style="font-size:12px;color:var(--muted)">아직 분석 히스토리가 없습니다</div>'; return }
                el.innerHTML = singles.map(a => `
            <div class="hist-item" onclick="showDetailInModal(${a.id})">
                <img class="hist-thumb" src="${a.thumbnail_url || 'https://img.youtube.com/vi/' + a.video_id + '/hqdefault.jpg'}" alt="" loading="lazy">
                <div class="hist-title">${esc(a.title)}</div>
                <div class="hist-date">${fmtDate(a.created_at)}</div>
            </div>`).join('');
            } catch (e) { console.error(e) }
        }

        // === Detail ===
        async function showDetail(id) {
            try {
                const d = await api('/api/archive/' + id);
                if (d.success && d.analysis) {
                    const a = d.analysis;
                    document.getElementById('dCh').textContent = a.channel_name || '';
                    document.getElementById('dTitle').textContent = a.title || '';
                    document.getElementById('dBody').innerHTML = fmt(a.summary || '요약 내용이 없습니다.');
                    document.getElementById('dLink').href = 'https://www.youtube.com/watch?v=' + a.video_id;
                    document.getElementById('detailModal').classList.add('show');
                } else toast('불러올 수 없습니다', false);
            } catch (e) { toast('오류', false) }
        }

        async function showDetailInModal(id) {
            try {
                const d = await api('/api/archive/' + id);
                if (d.success && d.analysis) {
                    const a = d.analysis;
                    document.getElementById('resCh').textContent = a.channel_name || '';
                    document.getElementById('resTitle').textContent = a.title || '';
                    document.getElementById('resBody').innerHTML = fmt(a.summary || '');
                    document.getElementById('resLink').href = 'https://www.youtube.com/watch?v=' + a.video_id;
                    document.getElementById('analyzeResult').style.display = 'block';
                }
            } catch (e) { console.error(e) }
        }

        function closeDetail() { document.getElementById('detailModal').classList.remove('show') }

        // === Util ===
        function esc(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : '' }
        function fmtDate(s) { if (!s) return ''; const d = new Date(s); return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) }
        function fmt(t) { if (!t) return ''; return t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/^/, '<p>') + '</p>' }

        // Keyboard
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeDetail(); closeAnalyze() }
            if (e.key === 'Enter' && document.activeElement.id === 'videoUrl') analyze();
            if (e.key === 'Enter' && document.activeElement.id === 'chInput') addCh();
        });

        // Init
        loadFeed();
        loadCh();
    </script>
</body>

</html>
