<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 요약봇</title>
    <meta name="description" content="AI 기반 YouTube 영상 자동 요약 대시보드">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #f0f4f8;
            --bg2: #ffffff;
            --card: #ffffff;
            --card-h: #f7fafc;
            --border: #e2e8f0;
            --border-l: #edf2f7;
            --t1: #1a202c;
            --t2: #4a5568;
            --t3: #a0aec0;
            --blue: #3b82f6;
            --blue-h: #2563eb;
            --blue-bg: #ebf2ff;
            --blue-lt: rgba(59, 130, 246, .08);
            --green: #22c55e;
            --green-bg: rgba(34, 197, 94, .1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, .1);
            --orange: #f59e0b;
            --orange-bg: rgba(245, 158, 11, .1);
            --purple: #8b5cf6;
            --purple-bg: rgba(139, 92, 246, .1);
            --r: 12px;
            --rs: 8px;
            --tr: .2s ease;
            --shadow: 0 1px 3px rgba(0, 0, 0, .08);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, .1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--t1);
            line-height: 1.6;
            min-height: 100vh
        }

        /* ===== Header ===== */
        .hd {
            background: var(--blue);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(59, 130, 246, .3)
        }

        .hd-in {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 17px;
            color: #fff;
            text-decoration: none
        }

        .logo-i {
            font-size: 20px
        }

        .hd-nav {
            display: flex;
            gap: 2px
        }

        .hd-btn {
            padding: 7px 16px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, .7);
            background: none;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--tr);
            font-family: inherit
        }

        .hd-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, .15)
        }

        .hd-btn.on {
            color: #fff;
            background: rgba(255, 255, 255, .2)
        }

        /* ===== Container ===== */
        .ct {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px
        }

        .pane {
            display: none;
            animation: fi .3s ease
        }

        .pane.on {
            display: block
        }

        @keyframes fi {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* ===== Status Cards ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px
        }

        .stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 20px;
            cursor: pointer;
            transition: var(--tr);
            box-shadow: var(--shadow)
        }

        .stat:hover {
            border-color: var(--blue);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px)
        }

        .stat-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px
        }

        .stat-icon-ch {
            background: var(--blue-bg);
            color: var(--blue)
        }

        .stat-icon-sum {
            background: var(--purple-bg);
            color: var(--purple)
        }

        .stat-icon-run {
            background: var(--green-bg);
            color: var(--green)
        }

        .stat-val {
            font-size: 28px;
            font-weight: 800;
            color: var(--t1)
        }

        .stat-unit {
            font-size: 14px;
            font-weight: 400;
            color: var(--t3);
            margin-left: 2px
        }

        .stat-sub {
            font-size: 12px;
            color: var(--t3);
            margin-top: 2px
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: var(--rs);
            cursor: pointer;
            transition: var(--tr);
            font-family: inherit;
            text-decoration: none
        }

        .btn-p {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 1px 4px rgba(59, 130, 246, .3)
        }

        .btn-p:hover {
            background: var(--blue-h)
        }

        .btn-p:disabled {
            opacity: .5;
            cursor: not-allowed
        }

        .btn-g {
            background: var(--card);
            color: var(--t2);
            border: 1px solid var(--border)
        }

        .btn-g:hover {
            background: var(--bg);
            border-color: var(--blue)
        }

        .btn-d {
            background: transparent;
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, .3);
            padding: 4px 10px;
            font-size: 12px
        }

        .btn-d:hover {
            background: var(--red-bg)
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px
        }

        .btn-sum {
            background: var(--blue-bg);
            color: var(--blue);
            border: 1px solid rgba(59, 130, 246, .2);
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            white-space: nowrap
        }

        .btn-sum:hover {
            background: rgba(59, 130, 246, .15)
        }

        /* ===== Section ===== */
        .sec-h {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px
        }

        .sec-t {
            font-size: 18px;
            font-weight: 700
        }

        .sec-link {
            font-size: 13px;
            color: var(--blue);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500
        }

        .sec-link:hover {
            text-decoration: underline
        }

        /* ===== Video Card ===== */
        .v-list {
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .v-wrap {
            border-radius: var(--r);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--tr);
            background: var(--card);
            box-shadow: var(--shadow)
        }

        .v-wrap:hover {
            border-color: rgba(59, 130, 246, .3);
            box-shadow: var(--shadow-lg)
        }

        .v-card {
            padding: 16px;
            display: flex;
            gap: 16px
        }

        .v-thumb-wrap {
            position: relative;
            min-width: 200px;
            width: 200px
        }

        .v-thumb {
            width: 200px;
            height: 113px;
            border-radius: var(--rs);
            object-fit: cover;
            background: var(--bg)
        }

        .v-dur {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0, 0, 0, .75);
            color: #fff;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 500
        }

        .v-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column
        }

        .v-ch {
            font-size: 12px;
            color: var(--t3);
            font-weight: 500;
            margin-bottom: 2px
        }

        .v-title {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 4px;
            color: var(--t1);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .v-preview {
            font-size: 13px;
            color: var(--t2);
            line-height: 1.5;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .v-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px
        }

        .v-meta {
            font-size: 11px;
            color: var(--t3)
        }

        /* ===== Tags ===== */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 4px
        }

        .tag-pos {
            background: var(--green-bg);
            color: #16a34a
        }

        .tag-neg {
            background: var(--red-bg);
            color: #dc2626
        }

        .tag-neu {
            background: rgba(160, 174, 192, .12);
            color: #718096
        }

        .tag-urg {
            background: var(--red-bg);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, .2)
        }

        .tag-maj {
            background: var(--orange-bg);
            color: #d97706
        }

        .tag-nor {
            background: rgba(160, 174, 192, .08);
            color: #a0aec0
        }

        .tag-stk {
            background: var(--blue-bg);
            color: var(--blue);
            border: 1px solid rgba(59, 130, 246, .15)
        }

        /* ===== AI Panel (Inline Expand) ===== */
        .ai-panel {
            display: none;
            background: #f8fafc;
            border-top: 1px solid var(--border);
            padding: 20px;
            animation: fi .3s ease
        }

        .ai-panel.open {
            display: block
        }

        .ai-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px
        }

        .ai-badge {
            font-size: 13px;
            color: var(--blue);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .ai-close {
            background: none;
            border: none;
            color: var(--t3);
            font-size: 18px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px
        }

        .ai-close:hover {
            color: var(--t1);
            background: var(--border-l)
        }

        .ai-tags {
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px
        }

        .ai-sec {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--rs);
            padding: 14px;
            margin-bottom: 10px
        }

        .ai-sec-t {
            font-size: 12px;
            color: var(--blue);
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: .3px
        }

        .ai-point {
            font-size: 13px;
            color: var(--t2);
            line-height: 1.7;
            margin-bottom: 3px;
            padding-left: 16px;
            text-indent: -16px
        }

        .ai-insight {
            font-size: 13px;
            color: var(--t2);
            line-height: 1.7;
            margin-top: 6px
        }

        .ai-insight strong {
            color: var(--t1)
        }

        .ai-text {
            font-size: 14px;
            color: var(--t2);
            line-height: 1.8;
            margin-top: 14px
        }

        .ai-text p {
            margin-bottom: 10px
        }

        .ai-text strong {
            color: var(--t1)
        }

        .ai-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--blue);
            margin-top: 10px;
            text-decoration: none;
            font-weight: 500
        }

        .ai-link:hover {
            text-decoration: underline
        }

        /* ===== Analyze Section ===== */
        .analyze {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow)
        }

        .analyze-t {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--t2)
        }

        .inp-row {
            display: flex;
            gap: 8px
        }

        .inp {
            flex: 1;
            padding: 10px 14px;
            font-size: 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--rs);
            color: var(--t1);
            outline: none;
            transition: var(--tr);
            font-family: inherit
        }

        .inp:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .12)
        }

        .inp::placeholder {
            color: var(--t3)
        }

        /* ===== Channel Cards ===== */
        .ch-list {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .ch-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--tr);
            box-shadow: var(--shadow)
        }

        .ch-card:hover {
            border-color: var(--blue)
        }

        .ch-info {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .ch-av {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff
        }

        .ch-name {
            font-size: 14px;
            font-weight: 600
        }

        .ch-id {
            font-size: 11px;
            color: var(--t3)
        }

        /* ===== Empty ===== */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--t3)
        }

        .empty-i {
            font-size: 48px;
            margin-bottom: 16px
        }

        .empty-t {
            font-size: 16px;
            font-weight: 600;
            color: var(--t2)
        }

        .empty-d {
            font-size: 13px;
            margin-top: 8px
        }

        /* ===== Modal ===== */
        .modal-bg {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 32, 44, .6);
            z-index: 800;
            align-items: center;
            justify-content: center;
            padding: 24px
        }

        .modal-bg.show {
            display: flex
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: var(--shadow-lg)
        }

        .modal-h {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px
        }

        .modal-x {
            background: none;
            border: none;
            color: var(--t3);
            font-size: 24px;
            cursor: pointer;
            padding: 4px
        }

        .modal-x:hover {
            color: var(--t1)
        }

        /* ===== Toast / Loading ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: var(--rs);
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: .3s ease;
            box-shadow: var(--shadow-lg)
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1
        }

        .toast-ok {
            background: var(--green);
            color: #fff
        }

        .toast-err {
            background: var(--red);
            color: #fff
        }

        .spin {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: sp .8s linear infinite;
            display: inline-block
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }

        .ld {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(240, 244, 248, .9);
            z-index: 500;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px
        }

        .ld.show {
            display: flex
        }

        .ld-t {
            font-size: 14px;
            color: var(--t2);
            font-weight: 500
        }

        /* ===== Footer ===== */
        .ft {
            text-align: center;
            padding: 24px;
            font-size: 12px;
            color: var(--t3);
            border-top: 1px solid var(--border);
            margin-top: 40px
        }

        /* ===== Responsive ===== */
        @media(max-width:768px) {
            .stats {
                grid-template-columns: 1fr
            }

            .v-card {
                flex-direction: column
            }

            .v-thumb-wrap {
                width: 100%;
                min-width: 100%
            }

            .v-thumb {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9
            }

            .ct {
                padding: 16px
            }

            .inp-row {
                flex-direction: column
            }

            .hd-btn {
                padding: 6px 10px;
                font-size: 12px
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="hd">
        <div class="hd-in">
            <a href="/" class="logo"><span class="logo-i">▶</span> YouTube 요약봇</a>
            <nav class="hd-nav">
                <button class="hd-btn on" data-t="dash">📊 대시보드</button>
                <button class="hd-btn" data-t="ch">📡 채널관리</button>
                <button class="hd-btn" data-t="arch">📁 보관함</button>
            </nav>
        </div>
    </header>

    <main class="ct">

        <!-- ===== 대시보드 ===== -->
        <div id="p-dash" class="pane on">
            <div class="stats">
                <div class="stat" onclick="switchTab('ch')">
                    <div class="stat-top">
                        <div class="stat-icon stat-icon-ch">▶</div>
                    </div>
                    <div class="stat-val" id="sChN">-<span class="stat-unit">개</span></div>
                    <div class="stat-sub">등록 채널 · 채널 추가하기</div>
                </div>
                <div class="stat" onclick="switchTab('arch')">
                    <div class="stat-top">
                        <div class="stat-icon stat-icon-sum">📄</div>
                    </div>
                    <div class="stat-val" id="sSumN">-<span class="stat-unit">개</span></div>
                    <div class="stat-sub">오늘 요약 · 새로운 요약 확인</div>
                </div>
                <div class="stat" onclick="triggerDigest()">
                    <div class="stat-top">
                        <div class="stat-icon stat-icon-run">✅</div>
                    </div>
                    <div class="stat-val" id="sRun" style="font-size:16px">-</div>
                    <div class="stat-sub">마지막 실행 · 클릭하여 실행</div>
                </div>
            </div>

            <div class="analyze">
                <div class="analyze-t">🔍 YouTube 영상 직접 분석</div>
                <div class="inp-row">
                    <input class="inp" id="videoUrl" placeholder="YouTube URL을 입력하세요">
                    <button class="btn btn-p" id="btnAn" onclick="analyzeVideo()">🔍 분석</button>
                </div>
            </div>

            <div class="sec-h">
                <h2 class="sec-t">오늘의 요약</h2>
                <div style="display:flex;gap:8px;align-items:center">
                    <a class="sec-link" onclick="switchTab('arch')">전체보기</a>
                    <button class="btn btn-g btn-sm" onclick="loadDash()">🔄</button>
                    <button class="btn btn-p btn-sm" id="btnDig" onclick="triggerDigest()">▶ 다이제스트 실행</button>
                </div>
            </div>
            <div id="dashList" class="v-list">
                <div class="empty">
                    <div class="empty-i">📺</div>
                    <div class="empty-t">요약된 영상이 없습니다</div>
                    <div class="empty-d">채널을 등록하고 다이제스트를 실행하거나, URL을 직접 분석하세요</div>
                </div>
            </div>
        </div>

        <!-- ===== 채널관리 ===== -->
        <div id="p-ch" class="pane">
            <div class="sec-h">
                <h2 class="sec-t">📡 구독 채널 관리</h2>
            </div>
            <div class="inp-row" style="margin-bottom:20px">
                <input class="inp" id="chUrl" placeholder="YouTube 채널 URL (예: https://www.youtube.com/@blueoak1004)">
                <button class="btn btn-p" onclick="addCh()">+ 채널 추가</button>
            </div>
            <div id="chList" class="ch-list">
                <div class="empty">
                    <div class="empty-i">📡</div>
                    <div class="empty-t">등록된 채널이 없습니다</div>
                </div>
            </div>
        </div>

        <!-- ===== 보관함 ===== -->
        <div id="p-arch" class="pane">
            <div class="sec-h">
                <h2 class="sec-t">📁 분석 보관함</h2>
            </div>
            <div id="archList" class="v-list">
                <div class="empty">
                    <div class="empty-i">📁</div>
                    <div class="empty-t">보관된 분석이 없습니다</div>
                </div>
            </div>
        </div>

    </main>

    <footer class="ft">YouTube 요약봇 © 2025 · Powered by Gemini AI</footer>

    <!-- URL Analysis Result Modal -->
    <div id="resModal" class="modal-bg" onclick="if(event.target===this)closeRes()">
        <div class="modal">
            <div class="modal-h">
                <div>
                    <div style="font-size:12px;color:var(--blue);font-weight:500" id="resCh"></div>
                    <h2 style="font-size:18px" id="resTitle"></h2>
                </div>
                <button class="modal-x" onclick="closeRes()">✕</button>
            </div>
            <div id="resBody"></div>
        </div>
    </div>

    <!-- Loading / Toast -->
    <div id="ld" class="ld">
        <div class="spin" style="width:40px;height:40px;border-width:3px"></div>
        <div class="ld-t" id="ldT">처리 중...</div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        const A = '';

        // ===== Tabs =====
        function switchTab(t) {
            document.querySelectorAll('.hd-btn').forEach(b => { b.classList.toggle('on', b.dataset.t === t) });
            document.querySelectorAll('.pane').forEach(p => { p.classList.toggle('on', p.id === 'p-' + t) });
            if (t === 'ch') loadCh(); if (t === 'arch') loadArch();
        }
        document.querySelectorAll('.hd-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.t)));

        // ===== Utils =====
        function toast(m, ok = true) { const t = document.getElementById('toast'); t.textContent = m; t.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err') + ' show'; setTimeout(() => t.classList.remove('show'), 3000) }
        function showLd(t) { document.getElementById('ldT').textContent = t || '처리 중...'; document.getElementById('ld').classList.add('show') }
        function hideLd() { document.getElementById('ld').classList.remove('show') }
        function esc(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : '' }
        function fmtDate(s) { if (!s) return ''; const d = new Date(s); return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) }
        function fmtSum(t) { if (!t) return ''; return '<p>' + t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>') + '</p>' }
        async function api(u, m = 'GET', b = null) { const o = { method: m, headers: { 'Content-Type': 'application/json' } }; if (b) o.body = JSON.stringify(b); const r = await fetch(A + u, o); return r.json() }

        // ===== Tag Helpers =====
        function sTag(s) {
            if (s === 'positive') return '<span class="tag tag-pos">🟢 호재</span>';
            if (s === 'negative') return '<span class="tag tag-neg">🔴 악재</span>';
            return '<span class="tag tag-neu">🟡 중립</span>';
        }
        function iTag(i) {
            if (i === 'urgent') return '<span class="tag tag-urg">🚨 긴급</span>';
            if (i === 'major') return '<span class="tag tag-maj">⭐ 주요</span>';
            return '<span class="tag tag-nor">ℹ️ 일반</span>';
        }
        function stockTags(raw) {
            let arr = []; try { arr = typeof raw === 'string' ? JSON.parse(raw) : (raw || []) } catch (e) { }
            return arr.slice(0, 5).map(s => '<span class="tag tag-stk">' + esc(s) + '</span>').join('');
        }
        function pointsArr(raw) { try { return typeof raw === 'string' ? JSON.parse(raw) : (raw || []) } catch (e) { return [] } }

        // ===== Build AI Panel =====
        function buildAiPanel(a, id) {
            let h = '<div class="ai-panel" id="ai-' + id + '">';
            h += '<div class="ai-header"><div class="ai-badge">🤖 AI 코멘트</div><button class="ai-close" onclick="closeAi(' + id + ')">✕</button></div>';
            h += '<div class="ai-tags">' + sTag(a.sentiment) + iTag(a.importance) + stockTags(a.key_stocks) + '</div>';
            const pts = pointsArr(a.key_points);
            if (pts.length) {
                h += '<div class="ai-sec"><div class="ai-sec-t">📋 핵심 포인트</div>';
                pts.forEach(p => { h += '<div class="ai-point">• ' + esc(p) + '</div>' });
                h += '</div>';
            }
            if (a.market_impact || a.investment_insight) {
                h += '<div class="ai-sec">';
                if (a.market_impact) h += '<div class="ai-insight"><strong>📊 시장 영향:</strong> ' + esc(a.market_impact) + '</div>';
                if (a.investment_insight) h += '<div class="ai-insight"><strong>💡 투자 시사점:</strong> ' + esc(a.investment_insight) + '</div>';
                h += '</div>';
            }
            h += '<div class="ai-text">' + fmtSum(a.summary || '') + '</div>';
            h += '<a class="ai-link" href="https://www.youtube.com/watch?v=' + a.video_id + '" target="_blank">🔗 원본 영상 보기</a>';
            h += '</div>';
            return h;
        }

        // ===== Build Video Card =====
        function buildCard(a) {
            const thumb = a.thumbnail_url || 'https://img.youtube.com/vi/' + a.video_id + '/hqdefault.jpg';
            return `
    <div class="v-wrap" id="wrap-${a.id}">
        <div class="v-card">
            <div class="v-thumb-wrap">
                <img class="v-thumb" src="${thumb}" alt="" loading="lazy" onerror="this.src='https://img.youtube.com/vi/${a.video_id}/hqdefault.jpg'">
            </div>
            <div class="v-info">
                <div class="v-ch">${esc(a.channel_name || '')} · ${fmtDate(a.created_at)}</div>
                <div class="v-title">${esc(a.title)}</div>
                <div class="v-preview">${esc((a.summary || '').substring(0, 120))}</div>
                <div class="v-bottom">
                    <div class="v-meta">${a.analysis_type === 'daily' ? '🤖 자동 수집' : '👤 수동 분석'}</div>
                    <button class="btn-sum" onclick="event.stopPropagation();toggleAi(${a.id})">요약 보기</button>
                </div>
            </div>
        </div>
        ${buildAiPanel(a, a.id)}
    </div>`;
        }

        // ===== Toggle AI Panel =====
        function toggleAi(id) {
            const panel = document.getElementById('ai-' + id);
            if (!panel) return;
            document.querySelectorAll('.ai-panel.open').forEach(p => { if (p.id !== 'ai-' + id) p.classList.remove('open') });
            panel.classList.toggle('open');
            if (panel.classList.contains('open') && !panel.dataset.loaded) { fetchAndFillAi(id) }
        }
        async function fetchAndFillAi(id) {
            const panel = document.getElementById('ai-' + id);
            if (!panel || panel.dataset.loaded) return;
            try {
                const d = await api('/api/archive/' + id);
                if (d.success && d.analysis) {
                    const a = d.analysis;
                    panel.outerHTML = buildAiPanel(a, id).replace('class="ai-panel"', 'class="ai-panel open"');
                    const np = document.getElementById('ai-' + id); if (np) np.dataset.loaded = '1';
                }
            } catch (e) { console.error(e) }
        }
        function closeAi(id) { const p = document.getElementById('ai-' + id); if (p) p.classList.remove('open') }

        // ===== Dashboard =====
        async function loadDash() {
            try {
                const [archD, chD, digD] = await Promise.all([api('/api/archive/list'), api('/api/channels'), api('/api/daily_digest/latest')]);
                const chs = chD.channels || []; const ans = archD.analyses || [];
                document.getElementById('sChN').innerHTML = chs.length + '<span class="stat-unit">개</span>';
                document.getElementById('sSumN').innerHTML = ans.length + '<span class="stat-unit">개</span>';
                if (digD.success && digD.digest) {
                    const d = new Date(digD.digest.completed_at || digD.digest.created_at);
                    const ago = Math.round((Date.now() - d.getTime()) / 60000);
                    document.getElementById('sRun').textContent = ago < 60 ? ago + '분 전' : Math.round(ago / 60) + '시간 전';
                } else { document.getElementById('sRun').textContent = '미실행' }
                const ct = document.getElementById('dashList');
                if (!ans.length) { ct.innerHTML = '<div class="empty"><div class="empty-i">📺</div><div class="empty-t">요약된 영상이 없습니다</div><div class="empty-d">채널을 등록하고 다이제스트를 실행하거나, URL을 직접 분석하세요</div></div>'; return }
                ct.innerHTML = ans.slice(0, 15).map(a => buildCard(a)).join('');
            } catch (e) { console.error(e) }
        }

        // ===== Channels =====
        async function loadCh() {
            try {
                const d = await api('/api/channels'); const el = document.getElementById('chList');
                if (!d.channels || !d.channels.length) { el.innerHTML = '<div class="empty"><div class="empty-i">📡</div><div class="empty-t">등록된 채널이 없습니다</div></div>'; return }
                el.innerHTML = d.channels.map(c => `
            <div class="ch-card"><div class="ch-info"><div class="ch-av">${(c.channel_name || '?')[0]}</div>
            <div><div class="ch-name">${esc(c.channel_name || c.channel_url)}</div><div class="ch-id">${esc(c.channel_id || '')}</div></div></div>
            <button class="btn btn-d" onclick="delCh(${c.id},'${esc(c.channel_name)}')">삭제</button></div>`).join('');
            } catch (e) { console.error(e) }
        }
        async function addCh() {
            const url = document.getElementById('chUrl').value.trim(); if (!url) { toast('채널 URL을 입력해주세요', false); return }
            showLd('채널 등록 중...'); try {
                const d = await api('/api/channels', 'POST', { channel_url: url }); hideLd();
                if (d.success) { toast('✅ ' + d.channel.channel_name + ' 등록'); document.getElementById('chUrl').value = ''; loadCh(); loadDash() }
                else toast('❌ ' + (d.message || '실패'), false)
            } catch (e) { hideLd(); toast('❌ 오류', false) }
        }
        async function delCh(id, name) {
            if (!confirm('"' + name + '" 삭제할까요?')) return;
            try { await api('/api/channels/' + id, 'DELETE'); toast('🗑️ 삭제'); loadCh(); loadDash() } catch (e) { toast('❌', false) }
        }

        // ===== Archive =====
        async function loadArch() {
            try {
                const d = await api('/api/archive/list'); const ct = document.getElementById('archList');
                if (!d.analyses || !d.analyses.length) { ct.innerHTML = '<div class="empty"><div class="empty-i">📁</div><div class="empty-t">보관된 분석이 없습니다</div></div>'; return }
                ct.innerHTML = d.analyses.map(a => buildCard(a)).join('')
            } catch (e) { console.error(e) }
        }

        // ===== Digest =====
        async function triggerDigest() {
            const btn = document.getElementById('btnDig'); btn.disabled = true; btn.textContent = '⏳ 실행 중...';
            showLd('데일리 다이제스트 실행 중... (2~3분 소요)');
            try {
                const d = await api('/api/daily_digest', 'POST', { hours: 48 }); hideLd();
                if (d.success) { toast('✅ ' + d.total_videos + '개 수집, ' + d.total_summarized + '개 요약'); loadDash() }
                else toast('❌ ' + (d.message || '실패'), false)
            } catch (e) { hideLd(); toast('❌ 오류', false) }
            finally { btn.disabled = false; btn.textContent = '▶ 다이제스트 실행' }
        }

        // ===== URL Analysis =====
        async function analyzeVideo() {
            const url = document.getElementById('videoUrl').value.trim(); if (!url) { toast('URL을 입력해주세요', false); return }
            const btn = document.getElementById('btnAn'); btn.disabled = true; showLd('영상 분석 중...');
            try {
                const d = await api('/api/analyze', 'POST', { video_url: url, analysis_type: 'single' }); hideLd();
                if (d.success) {
                    document.getElementById('resCh').textContent = d.video_info?.channel_name || '';
                    document.getElementById('resTitle').textContent = d.video_info?.title || '';
                    let h = '<div class="ai-tags">' + sTag(d.sentiment) + iTag(d.importance) + stockTags(d.key_stocks) + '</div>';
                    const pts = d.key_points || [];
                    if (pts.length) { h += '<div class="ai-sec"><div class="ai-sec-t">📋 핵심 포인트</div>'; pts.forEach(p => { h += '<div class="ai-point">• ' + esc(p) + '</div>' }); h += '</div>' }
                    if (d.market_impact || d.investment_insight) {
                        h += '<div class="ai-sec">';
                        if (d.market_impact) h += '<div class="ai-insight"><strong>📊 시장 영향:</strong> ' + esc(d.market_impact) + '</div>';
                        if (d.investment_insight) h += '<div class="ai-insight"><strong>💡 투자 시사점:</strong> ' + esc(d.investment_insight) + '</div>'; h += '</div>'
                    }
                    h += '<div class="ai-text">' + fmtSum(d.summary || '') + '</div>';
                    h += '<a class="ai-link" href="' + esc(url) + '" target="_blank">🔗 원본 영상 보기</a>';
                    document.getElementById('resBody').innerHTML = h;
                    document.getElementById('resModal').classList.add('show');
                    document.getElementById('videoUrl').value = ''; toast('✅ 분석 완료!'); loadDash();
                } else toast('❌ ' + (d.message || '실패'), false)
            } catch (e) { hideLd(); toast('❌ 오류', false) } finally { btn.disabled = false }
        }
        function closeRes() { document.getElementById('resModal').classList.remove('show') }

        // ===== Keyboard =====
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeRes();
            if (e.key === 'Enter' && document.activeElement.id === 'videoUrl') analyzeVideo();
            if (e.key === 'Enter' && document.activeElement.id === 'chUrl') addCh()
        });

        // Init
        loadDash();
    </script>
</body>

</html>
